name: GitHub Actions 
on:
  schedule:
    - cron: "* 9 * * *"
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
        - master

jobs: 
    build:
        runs-on: windows-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v6
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                node-version: 26
            - run: npm ci
            - name: Say Hello
              run: echo "Hello, World!"





